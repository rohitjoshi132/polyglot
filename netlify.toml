[build]
  base = "."
  command = "corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/polyglot run build"
  publish = "artifacts/polyglot/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

# Proxy /api/* to the Render backend (avoids CORS and VITE_API_URL at build time)
[[redirects]]
  from = "/api/*"
  to = "https://polyglot-api-okgo.onrender.com/api/:splat"
  status = 200
  force = true

# SPA Fallback: Redirect all unrecognized traffic to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
